<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Landing Page</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1f2937, #111827);
        color: #f9fafb;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        width: min(680px, 92vw);
        padding: 48px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
      }
      h1 { margin-top: 0; font-size: clamp(2rem, 5vw, 4rem); }
      p { line-height: 1.7; color: #d1d5db; }
      a {
        display: inline-flex;
        margin-top: 20px;
        color: #111827;
        background: #fbbf24;
        padding: 14px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p>單檔 HTML MVP</p>
      <h1>GitHub Pages 一鍵部署</h1>
      <p>9999</p>
      <a href="https://github.com/" target="_blank" rel="noreferrer">Connect GitHub</a>
    </main>
  </body>
</html>
